name: Deploy Backend to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 👈 불필요한 폴더 생성, zip 압축 모두 제거했습니다.
      - name: Prepare Executable JAR
        run: |
          # -plain.jar를 제외한 '진짜 실행 파일'만 찾아서 이름을 application.jar로 변경합니다.
          find build/libs -name "*.jar" ! -name "*-plain.jar" -exec mv {} application.jar \;

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION }}
          application_name: WeatherOfTheHeart
          environment_name: WeatherOfTheHeart-env
          version_label: v-${{ github.run_id }}
          #배포 플러그인은 최상단 기준이므로 반드시 'backend/' 경로를 명시해야 합니다!
          deployment_package: backend/application.jar
          use_existing_version_if_available: true
          wait_for_deployment: true
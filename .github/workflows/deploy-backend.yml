name: Deploy Backend to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'  # backend 폴더 내부가 변경될 때만 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Node.js 24 환경을 강제하여 향후 발생할 버전 경고를 방지합니다.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: ./backend  # 모노레포 구조이므로 모든 명령어는 backend 폴더 기준

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Generate Deployment Package
        run: |
          mkdir -p deploy
          cp build/libs/*-SNAPSHOT.jar deploy/application.jar
          cd deploy && zip -r deploy.zip .

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION }}
          application_name: WeatherOfTheHeart
          environment_name: WeatherOfTheHeart-env
          version_label: github-action-${{ github.sha }}
          deployment_package: backend/deploy/deploy.zip
          use_existing_version_if_available: true  # 동일한 버전 라벨이 있어도 배포 진행
          wait_for_deployment: true
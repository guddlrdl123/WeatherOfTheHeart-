name: Deploy Backend to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Prepare Deploy Package
        run: |
          # 실행 가능한 jar 파일만 application.jar로 복사
          find build/libs -name "*.jar" ! -name "*-plain.jar" -exec cp {} application.jar \;

          # Elastic Beanstalk 배포용 zip 생성
          zip -r deploy.zip application.jar Procfile

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION }}
          application_name: WeatherOfTheHeart
          environment_name: WeatherOfTheHeart-env
          version_label: v-${{ github.run_id }}
          deployment_package: backend/deploy.zip
          use_existing_version_if_available: true
          wait_for_deployment: true
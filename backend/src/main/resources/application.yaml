    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY:ddbb906b45fd613a4e25cde0463df439}
    client-secret: ${KAKAO_CLIENT_SECRET:}
  naver:
    client-id: ${NAVER_CLIENT_ID:1LrLV1d4R0ubSOcg8Ir3}
    client-secret: ${NAVER_CLIENT_SECRET:}

# AWS S3 이미지 저장 설정
aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket: ${AWS_S3_BUCKET_NAME:weather-heart-image-bucket}
    public-base-url: ${AWS_S3_PUBLIC_BASE_URL:https://weather-heart-image-bucket.s3.ap-northeast-2.amazonaws.com}

    # AWS S3 RAG 원본 문서 저장 설정
    # Vector DB에 임베딩하기 전 PDF/TXT/MD 원본 파일을 보관하는 비공개 버킷입니다.
    rag:
      bucket: ${AWS_S3_RAG_BUCKET_NAME:weatheroftheheart-rag-raw-documents}
      raw-prefix: ${AWS_S3_RAG_RAW_PREFIX:raw/}
      processed-prefix: ${AWS_S3_RAG_PROCESSED_PREFIX:processed/}
      failed-prefix: ${AWS_S3_RAG_FAILED_PREFIX:failed/}


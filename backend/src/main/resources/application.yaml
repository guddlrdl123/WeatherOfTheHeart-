server:
  port: ${SERVER_PORT:5000}  # AWS EB 환경변수가 없으면 기본 5000번 포트로 구동되도록 고정

spring:
  application:
    name: backend

  config:
    import:
      # 실행 위치가 프로젝트 루트, backend 폴더, 또는 그 상위 폴더여도 로컬 .env를 읽습니다.
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
      - optional:file:WeatherOfTheHeart/backend/.env[.properties]

  # 이메일 인증을 위한 메일 서버 설정.
  # .env의 MAIL_HOST/MAIL_PORT/MAIL_USERNAME/MAIL_PASSWORD가 있으면 우선 사용하고, 없으면 기본값을 사용
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # DB 연결 설정
  datasource:
    # DB 접속 정보는 .env의 DB_URL/DB_USERNAME/DB_PASSWORD가 있으면 우선 사용합니다.
    # AWS 배포 환경에서는 Elastic Beanstalk 환경 변수로 주입합니다.
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 개발 중 엔티티에 추가된 컬럼은 자동 반영하지만, 기존 컬럼 삭제는 수동 마이그레이션으로 처리합니다.
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  sql:
    init:
      # schema.sql/data.sql은 참고용으로 두고, 실행 중 DB 초기화로 기존 데이터를 덮지 않습니다.
      mode: never

# OpenAI 설정
openai:
  api-key: ${OPENAI_API_KEY:}

# AWS 설정
aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket: ${AWS_S3_BUCKET_NAME:}
    public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}